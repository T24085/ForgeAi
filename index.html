<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Hello World</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f0f1a; /* Dark, modern background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        /* A simple overlay for instructions */
        .overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            text-align: center;
            font-size: 1.2rem;
            opacity: 0.7;
            pointer-events: none; /* Allows clicks to pass through */
            animation: fadeInOut 4s infinite;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div class="overlay">Move your mouse to interact!</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size to full window
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Configuration
        const text = "HELLO WORLD";
        const particleSize = 2; // Size of each particle
        const gap = 4; // Sampling gap (lower = more particles, more CPU)
        const mouseRadius = 100; // Radius of mouse interaction
        const connectionDistance = 25; // Distance to connect particles with lines
        const mouseForce = 50; // How strongly the mouse repels particles

        let particlesArray = [];

        // Mouse object
        let mouse = {
            x: null,
            y: null
        }

        // Event listener for mouse movement
        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        // Event listener for mouse leaving the window
        window.addEventListener('mouseout', function() {
            mouse.x = null;
            mouse.y = null;
        });

        // Handle window resizing
        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        // Particle Class
        class Particle {
            constructor(x, y) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.targetX = x;
                this.targetY = y;
                this.vx = 0;
                this.vy = 0;
                this.ease = 0.1; // How fast it moves to its target
                this.size = particleSize;
                this.color = '#ffffff';
            }

            update() {
                // Calculate distance to mouse
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                // If mouse is close, apply repulsion force
                if (distance < mouseRadius) {
                    const forceDirectionX = dx / distance;
                    const forceDirectionY = dy / distance;
                    const force = (mouseRadius - distance) / mouseRadius;
                    const directionX = forceDirectionX * force * mouseForce;
                    const directionY = forceDirectionY * force * mouseForce;

                    this.vx -= directionX;
                    this.vy -= directionY;
                }

                // Easing towards target position (home)
                let dxHome = this.targetX - this.x;
                let dyHome = this.targetY - this.y;
                this.vx += dxHome * this.ease;
                this.vy += dyHome * this.ease;

                // Apply velocity
                this.x += this.vx;
                this.y += this.vy;

                // Apply friction to prevent infinite movement
                this.vx *= 0.95;
                this.vy *= 0.95;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Initialize particles from text
        function init() {
            particlesArray = [];
            
            // Set font properties
            ctx.font = 'bold 80px "Segoe UI", Tahoma, Geneva, Verdana, sans-serif';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Draw text to canvas to scan its pixels
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            // Get pixel data
            const textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // Clear the canvas (our text is now just in memory as pixel data)
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Scan the pixel data
            for (let y = 0; y < textCoordinates.height; y += gap) {
                for (let x = 0; x < textCoordinates.width; x += gap) {
                    // Check the alpha value (4th value in the RGBA tuple)
                    if (textCoordinates.data[(y * 4 * textCoordinates.width) + (x * 4) + 3] > 128) {
                        let positionX = x;
                        let positionY = y;
                        particlesArray.push(new Particle(positionX, positionY));
                    }
                }
            }
        }

        // Connect particles with lines if they are close
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;
                    let distance = dx * dx + dy * dy;

                    // Optimization: Only check particles within a certain distance squared
                    if (distance < (connectionDistance * connectionDistance)) {
                        opacityValue = 1 - (distance / (connectionDistance * connectionDistance));
                        ctx.strokeStyle = 'rgba(255, 255, 255,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Animation loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connect();
            requestAnimationFrame(animate);
        }

        // Start the animation
        init();
        animate();

    </script>
</body>
</html>
